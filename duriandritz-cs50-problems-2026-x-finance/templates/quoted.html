{% extends "layout.html" %}

{% block title %}
    QUOTE
{% endblock %}

{% block main %}
    <form action="/quote" method="post">
        <div class="mb-3">
            <input autocomplete="off" autofocus class="form-control mx-auto w-auto" name="symbol" placeholder="Stock Symbol" type="text">
        </div>
        <button class="btn btn-primary" type="submit">Search</button>
    </form>
    <div>
        <p>{{ name }} ({{ symbol }})</p>

        <p>Price: {{ price }} </p>
    </div>
{% endblock %}
